name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend — lint, typecheck, testes e cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: backend
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings 0

      - name: Checagem de formatação (Prettier)
        working-directory: backend
        run: npx prettier --check "src/**/*.ts"

      - name: Checagem de tipos
        working-directory: backend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Gerar cliente Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Testes unitários com cobertura
        working-directory: backend
        run: npm run test:cov -- --ci

      - name: Build de produção
        working-directory: backend
        run: npm run build

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-backend
          path: backend/coverage
          retention-days: 7

  frontend:
    name: Frontend — lint, typecheck, testes e build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Checagem de formatação (Prettier)
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: Checagem de tipos
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Testes com cobertura
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Build de produção
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-frontend
          path: frontend/coverage
          retention-days: 7

  docker-build:
    name: Build das imagens Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem do backend (sem publicar)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: exames-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build da imagem do frontend (sem publicar)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: exames-frontend:ci
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
